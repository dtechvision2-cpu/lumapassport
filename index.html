<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Passport Size Photo Maker</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <header>

        <h1>
            <i class="fa-solid fa-id-card"></i>
            AI Passport Size Photo Maker
        </h1>

        <p>
            Upload Photo → Remove Background → Select Background →
            Generate Passport Photo → Print & Download
        </p>

    </header>


    <!-- Upload Section -->

    <div class="card">

        <h2>Upload Photo</h2>

        <input
            type="file"
            id="upload"
            accept="image/*"
        >

        <button id="removeBgBtn">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            Remove Background
        </button>

    </div>


    <!-- Background -->

    <div class="card">

        <h2>Select Background</h2>

        <div class="bgButtons">

            <button
                class="bgBtn active"
                data-color="#ffffff">
                White
            </button>

            <button
                class="bgBtn"
                data-color="#4da6ff">
                Blue
            </button>

        </div>

    </div>


    <!-- Preview -->

    <div class="card">

        <h2>Passport Preview</h2>

        <canvas
            id="canvas"
            width="413"
            height="531">
        </canvas>

    </div>


    <!-- Print Sheet -->

    <div class="card">

        <h2>Select Print Sheet</h2>

        <select id="sheetSize">

            <option value="4x6">
                4 × 6 Inch
            </option>

            <option value="5x7">
                5 × 7 Inch
            </option>

            <option value="A4">
                A4 Sheet
            </option>

        </select>

    </div>


    <!-- Action Buttons -->

    <div class="card buttons">

        <button id="generateSheet">

            <i class="fa-solid fa-image"></i>

            Generate Sheet

        </button>


        <button id="downloadBtn">

            <i class="fa-solid fa-download"></i>

            Download PNG

        </button>


        <button id="printBtn">

            <i class="fa-solid fa-print"></i>

            Print

        </button>

    </div>



    <!-- Final Sheet Preview -->

    <div class="card">

        <h2>Print Preview</h2>

        <canvas
            id="sheetCanvas"
            width="1200"
            height="1800">
        </canvas>

    </div>

</div>
<div class="photo-controls" style="margin-top: 10px; display: flex; flex-direction: column; gap: 10px;">
    <label>Zoom: <input type="range" id="zoomRange" min="0.1" max="3" step="0.05" value="1"></label>
    <label>Move X: <input type="range" id="moveX" min="-200" max="200" step="1" value="0"></label>
    <label>Move Y: <input type="range" id="moveY" min="-200" max="200" step="1" value="0"></label>
</div>


<!-- Loading -->

<div id="loading">

    <div class="loader"></div>

    <p>Processing AI...</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/dist/bundle.js"></script>

<script src="app.js"></script>

</body>
</html>
